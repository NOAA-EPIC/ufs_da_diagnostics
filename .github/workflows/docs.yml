name: Build Docs

on:
  pull_request:
    branches: [ "main" ]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r docs/requirements.txt
          pip install .

      - name: Build Sphinx docs
        run: |
          sphinx-build -b html docs/ docs/_build/html
